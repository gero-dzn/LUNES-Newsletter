name: Re-enviar confirmación a suscriptores pendientes

on:
  workflow_dispatch:

jobs:
  confirm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: lunes/requirements.txt

      - name: Instalar dependencias
        run: pip install -r lunes/requirements.txt

      - name: Re-enviar confirmaciones
        env:
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL:         ${{ secrets.FROM_EMAIL }}
          REPLY_TO:           ${{ secrets.REPLY_TO }}
          HMAC_SECRET:        ${{ secrets.HMAC_SECRET }}
          API_BASE_URL:       ${{ secrets.API_BASE_URL }}
        run: python lunes/resend_confirm.py --send
